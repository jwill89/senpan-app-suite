    get:
      description: '**Auth:** permission:festival-stamp-rally'
      parameters:
      - description: Rally id.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StampRallyDetailResponse'
          description: Success
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Rally detail
      tags:
      - Stamp Rally
    put:
      description: |-
        **Auth:** permission:festival-stamp-rally

        Full replace of the editable fields (status is preserved — use close/reopen).
      parameters:
      - description: Rally id.
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                available_from:
                  description: UTC RFC-3339.
                  type: string
                available_to:
                  description: UTC RFC-3339.
                  type: string
                card_image:
                  type: string
                details:
                  description: Markdown.
                  type: string
                not_stamped_image:
                  type: string
                prizes:
                  items:
                    $ref: '#/components/schemas/StampRallyPrize'
                  type: array
                redeem_instructions:
                  description: Markdown.
                  type: string
                stamps:
                  items:
                    $ref: '#/components/schemas/StampRallyStamp'
                  type: array
                title:
                  description: Title (required).
                  type: string
              type: object
        description: Full rally fields.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OKResponse'
          description: Success
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Title required
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Replace a rally
      tags:
      - Stamp Rally
  /api/stamp-rallies/{id}/cards:
    post:
      description: |-
        **Auth:** permission:festival-stamp-rally

        Issues a tokenized participant card link (returns its token).
      parameters:
      - description: Rally id.
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                participant_name:
                  description: Required.
                  type: string
              type: object
        description: New card.
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StampRallyCardResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Name required
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Create a participant card
      tags:
      - Stamp Rally
  /api/stamp-rallies/{id}/cards/{cardId}:
    delete:
      description: |-
        **Auth:** permission:festival-stamp-rally

        A card with collected stamps can only be deleted once the rally is closed (the stamp log is kept).
      parameters:
      - description: Rally id.
        in: path
        name: id
        required: true
        schema:
          type: string
      - description: Card id.
        in: path
        name: cardId
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Card has stamps
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Delete a participant card
      tags:
      - Stamp Rally
  /api/stamp-rallies/{id}/close:
    post:
      description: |-
        **Auth:** permission:festival-stamp-rally

        Closes the rally (read-only; moves to the closed table).
      parameters:
      - description: Rally id.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
          description: Success
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Close a rally
      tags:
      - Stamp Rally
  /api/stamp-rallies/{id}/logs:
    get:
      description: '**Auth:** permission:festival-stamp-rally'
      parameters:
      - description: Rally id.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StampRallyLogsResponse'
          description: Success
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Event stamp log
      tags:
      - Stamp Rally
  /api/stamp-rallies/{id}/reopen:
    post:
      description: |-
        **Auth:** permission:festival-stamp-rally

        Reopens a closed rally.
      parameters:
      - description: Rally id.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
          description: Success
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Reopen a rally
      tags:
      - Stamp Rally
  /api/stamp-rallies/{id}/stamps/{stampId}:
    patch:
      description: |-
        **Auth:** permission:festival-stamp-rally

        Toggles a single stamp's paused flag without a full event re-save.
      parameters:
      - description: Rally id.
        in: path
        name: id
        required: true
        schema:
          type: string
      - description: Stamp id.
        in: path
        name: stampId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                paused:
                  description: Paused flag.
                  type: boolean
              type: object
        description: Pause toggle.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PausedResponse'
          description: Success
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Stamp not found
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Pause/resume a stall
      tags:
      - Stamp Rally
  /api/styles:
    get:
      description: '**Auth:** permission:system-themes'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StylesResponse'
          description: Success
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: List styles
      tags:
      - Bingo
    post:
      description: '**Auth:** permission:system-themes'
      requestBody:
        content:
          application/json:
            schema:
              properties:
                board_flourish:
                  description: Board flourish path.
                  type: string
                name:
                  description: Style name (required).
                  type: string
                number_flourish:
                  description: Number flourish path.
                  type: string
                tokens:
                  description: Design-token overrides (name→CSS value).
                  type: object
              type: object
        description: New theme.
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StyleCreateResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Create a theme
      tags:
      - Bingo
  /api/styles/{id}:
    delete:
      description: |-
        **Auth:** permission:system-themes

        If the deleted style was active, the active setting is cleared and an empty style_update reverts clients.
      parameters:
      - description: Style id.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Delete a theme
      tags:
      - Bingo
    get:
      description: '**Auth:** permission:system-themes'
      parameters:
      - description: Style id.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StyleGetResponse'
          description: Success
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Style not found
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Get a theme
      tags:
      - Bingo
    put:
      description: |-
        **Auth:** permission:system-themes

        Full replace. If this is the active style, the regenerated CSS is broadcast (style_update).
      parameters:
      - description: Style id.
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                board_flourish:
                  description: Board flourish path.
                  type: string
                name:
                  description: Style name (required).
                  type: string
                number_flourish:
                  description: Number flourish path.
                  type: string
                tokens:
                  description: Design-token overrides (name→CSS value).
                  type: object
              type: object
        description: Theme fields.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OKResponse'
          description: Success
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Replace a theme
      tags:
      - Bingo
  /api/styles/{id}/activate:
