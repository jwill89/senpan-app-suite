      tags:
      - Winners Log
  /api/winners-log/all:
    delete:
      description: |-
        **Auth:** permission:bingo-winners-log

        Bulk delete: removes every entry and reports how many rows were removed.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedCountResponse'
          description: Success
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Clear the winners log
      tags:
      - Winners Log
  /api/winners-log/frequent:
    get:
      description: '**Auth:** permission:bingo-winners-log'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrequentWinnersResponse'
          description: Success
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Frequent winners
      tags:
      - Winners Log
