# GitLab CI/CD — mirror of the local quality gates (and of .github/workflows/ci.yml,
# which only runs on GitHub). Three jobs: generate the tygo types once and share
# them as an artifact, then a Vue/TS frontend job (lint, type-check, unit tests,
# production build) and a Go backend job (lint, build, vet, test, govulncheck).
# A green pipeline means the same checks a developer runs locally have passed.

stages:
  - generate
  - test

# Run for merge requests and for branch pushes, but not both at once (avoids the
# duplicate "detached MR" + "branch" pipelines GitLab creates by default).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── tygo type generation ──────────────────────────────────────────────────────
# The TS domain types (frontend/src/types/api.generated.ts) are gitignored and
# generated from the Go model by tygo, so CI must regenerate them before the
# frontend type-checks / builds. Produced here in the Go image and handed to the
# frontend job as an artifact (keeps the frontend job a pure Node image).
gen-types:
  stage: generate
  image: golang:1.26
  cache:
    key:
      files:
        - src/go.sum
    paths:
      - .go-cache/
  variables:
    GOPATH: $CI_PROJECT_DIR/.go-cache
  script:
    - cd src
    - go run github.com/gzuidhof/tygo@v0.2.21 generate
  artifacts:
    paths:
      - frontend/src/types/api.generated.ts
    expire_in: 1 hour

# ── Frontend: lint · types · tests · build ────────────────────────────────────
frontend:
  stage: test
  image: node:24
  needs:
    - gen-types
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    # FontAwesome Pro packages (@fortawesome + the @awesome.me kit) install from
    # FontAwesome's private registry. The local frontend/.npmrc that points those
    # scopes at it is gitignored (it carries an auth token), so CI never receives
    # it — recreate it here from the masked CI/CD variable FONTAWESOME_TOKEN
    # (Settings → CI/CD → Variables; mark it Masked and Protected). Without this,
    # `npm ci` fails with "E401 Incorrect or missing password".
    - |
      if [ -z "$FONTAWESOME_TOKEN" ]; then
        echo "ERROR: FONTAWESOME_TOKEN is not set. Add it under Settings → CI/CD → Variables (Masked + Protected)." >&2
        exit 1
      fi
    - |
      {
        echo "@awesome.me:registry=https://npm.fontawesome.com/"
        echo "@fortawesome:registry=https://npm.fontawesome.com/"
        echo "//npm.fontawesome.com/:_authToken=${FONTAWESOME_TOKEN}"
      } > .npmrc
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint:check
    - npm run typecheck
    # Emit a JUnit report alongside the console output so test results show in the
    # pipeline's "Tests" tab and the merge-request widget (no log-scraping).
    - npm run test -- --reporter=default --reporter=junit --outputFile=junit.xml
    - npm run build
  artifacts:
    when: always # also collect on failure — that's when you want the report
    reports:
      junit: frontend/junit.xml
    expire_in: 1 week

# ── Backend: lint · build · vet · test · vuln scan ────────────────────────────
backend:
  stage: test
  image: golang:1.26
  needs: []
  cache:
    key:
      files:
        - src/go.sum
    paths:
      - .go-cache/
  variables:
    GOPATH: $CI_PROJECT_DIR/.go-cache
  before_script:
    # golangci-lint aggregates errcheck/govet/staticcheck/unused plus the extras
    # in src/.golangci.yml. Pinned to match the version developers run locally.
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
    - export PATH="$(go env GOPATH)/bin:$PATH"
  script:
    - cd src
    # Lint → console output plus a GitLab Code Quality report (shown in the MR
    # widget and inline on the diff). --path-prefix src rewrites report paths to
    # be repo-relative (the module lives in src/) so annotations land correctly.
    - golangci-lint run --path-prefix src --output.text.path stdout --output.code-climate.path gl-code-quality-report.json ./...
    - go build ./...
    - go vet ./...
    # gotestsum runs the tests with readable console output AND writes a JUnit
    # report for the pipeline's "Tests" tab / MR widget.
    - go run gotest.tools/gotestsum@latest --junitfile junit.xml --format pkgname -- ./...
    # Scan the module (and deps) for known Go vulnerabilities reaching our code.
    - go run golang.org/x/vuln/cmd/govulncheck@latest ./...
  artifacts:
    when: always # collect the reports even when a step fails
    reports:
      codequality: src/gl-code-quality-report.json
      junit: src/junit.xml
    expire_in: 1 week
