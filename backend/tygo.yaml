# tygo configuration — generates TypeScript interfaces from Go structs.
#
# This keeps the frontend's API types in sync with the backend `model` package.
# Run with:  npm run gen:types   (from the frontend/ folder)
# or:        go run github.com/gzuidhof/tygo@v0.2.21 generate   (from backend/)
#
# Keep the pinned version above in sync with frontend/package.json's
# `gen:types` script so type generation is reproducible across machines.
#
# The generated file is committed so the frontend builds without Go installed,
# but should be regenerated whenever the Go model types change.
packages:
  - path: "app-suite/internal/model"
    output_path: "../frontend/src/types/api.generated.ts"
    type_mappings:
      # Go time strings are ISO-8601 strings in JSON.
      "time.Time": "string"
    frontmatter: |
      /*
       * AUTO-GENERATED by tygo from backend/internal/model/model.go — DO NOT EDIT.
       * Regenerate with `npm run gen:types` (frontend) after changing Go models.
       */