    delete:
      description: |-
        **Auth:** permission:atelier-fonts

        Deletes a whole font: every uploaded variant file, the converted WOFF2 copy, and its metadata.
      parameters:
      - description: Font base name (filename minus extension).
        in: path
        name: base
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Font not found
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Delete a font
      tags:
      - Files
    patch:
      description: |-
        **Auth:** permission:atelier-fonts

        Partial update of one font (group): `family` sets the CSS font-family name ("" resets to the base name; must not collide with another font's), `serve` picks the served variant type (`TTF`/`OTF`/`WOFF`/`WOFF2`/`EOT`; "" = auto, WOFF2 preferred), `origins` replaces THIS font's external-site allowlist (bare origins, e.g. `https://mysite.carrd.co`; the app's own origin is always allowed).
      parameters:
      - description: Font base name (filename minus extension).
        in: path
        name: base
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                family:
                  description: Custom CSS family name (optional; "" resets to default).
                  type: string
                origins:
                  description: Allowed site origins (optional).
                  items:
                    type: string
                  type: array
                serve:
                  description: Served variant type (optional; "" = auto).
                  type: string
              type: object
        description: Font metadata to update.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OKResponse'
          description: Success
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid field / nothing to update
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Font not found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Family name taken
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Update a font's metadata
      tags:
      - Files
  /api/fonts/pub/f/{token}:
    get:
      description: |-
        **Auth:** public

        Streams the font behind an opaque rotating token (valid 7–14 days). Same-origin requests are always allowed; cross-origin requests need an `Origin` on THAT FONT's allowlist, echoed in `Access-Control-Allow-Origin` (browsers require CORS for cross-origin fonts, so this is enforced by the browser too). Requests with no usable Origin (e.g. pasting the URL) are refused.
      parameters:
      - description: Opaque font token from the kit stylesheet / settings payload.
        in: path
        name: token
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                format: binary
                type: string
          description: The font bytes.
        "403":
          content:
            application/json:
              schema:
