<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpan Apps</title>
    <!-- Primary Meta Tags -->
    <meta name="title" content="Senpan Tea House Apps" />
    <meta name="description" content="『 Peace, quiet, & a good cup of tea. 』

                                      Senpan Tea House & Atelier YAO's app suite for Bingo, Raffles, and more!" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://apps.senpan.cafe/" />
    <meta property="og:title" content="Senpan Tea House Apps" />
    <meta property="og:description" content="『 Peace, quiet, & a good cup of tea. 』

                                             Senpan Tea House & Atelier YAO's app suite for Bingo, Raffles, and more!" />
    <meta property="og:image" content="https://apps.senpan.cafe/images/share_banner.png?v=__OG_VERSION__" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://apps.senpan.cafe/" />
    <meta property="twitter:title" content="Senpan Tea House Apps" />
    <meta property="twitter:description" content="『 Peace, quiet, & a good cup of tea. 』

                                                  Senpan Tea House & Atelier YAO's app suite for Bingo, Raffles, and more!" />
    <meta property="twitter:image" content="https://apps.senpan.cafe/images/share_banner.png?v=__OG_VERSION__" />

    <!-- Fonts (header font loaded dynamically from settings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Stylesheets — app.css is imported in src/main.ts so Vite content-hashes
         it (cache-busting); its <link> is injected into <head> at build time. -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <!-- iOS home-screen icon (Safari ignores the web manifest icons). -->
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Senpan">
    <meta name="theme-color" content="#1a1c17">
</head>
<body>
<div id="app" v-cloak></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
