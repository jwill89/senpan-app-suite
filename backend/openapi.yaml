      description: |-
        **Auth:** permission:system-themes

        Makes the style active and broadcasts its CSS (style_update).
      parameters:
      - description: Style id.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OKResponse'
          description: Success
