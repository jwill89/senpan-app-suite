      description: '**Auth:** public'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveCSSResponse'
          description: Success
      security: []
      summary: Active theme CSS
      tags:
      - Bingo
  /api/styles/deactivate:
    post:
      description: |-
        **Auth:** permission:system-themes

        Clears the active style and broadcasts an empty style_update, reverting every client to the default look.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OKResponse'
          description: Success
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Deactivate the active theme
      tags:
      - Bingo
  /api/users:
    get:
      description: '**Auth:** admin'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersResponse'
          description: Success
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: List accounts
      tags:
      - Users & Account
  /api/users/{id}:
    delete:
      description: |-
        **Auth:** admin

        The reserved `admin` account is protected and cannot be deleted.
      parameters:
      - description: Target user id.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Protected account
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: User not found
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Delete an account
      tags:
      - Users & Account
    patch:
      description: |-
        **Auth:** admin

        Partial update — any supplied field is applied: `active`, `admin`, `permissions` (page-permission keys), `password` (min 8). The reserved `admin` account is protected (its `active`/`admin`/`password` can't be changed here; `permissions` may).
      parameters:
      - description: Target user id.
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                active:
                  description: Activate/deactivate.
                  type: boolean
                admin:
                  description: Grant/revoke admin.
                  type: boolean
                password:
                  description: New password (min 8).
                  type: string
                permissions:
                  description: Page-permission keys.
                  items:
                    type: string
                  type: array
              type: object
        description: Account fields to update.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OKResponse'
          description: Success
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation failed
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Protected account
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: User not found
      security:
      - cookieAuth: []
      - bearerAuth: []
      summary: Update an account
      tags:
      - Users & Account
  /api/version:
    get:
      description: '**Auth:** public'
      responses:
        "200":
          description: The backend semver
      security: []
      summary: Backend version
      tags:
      - System
  /api/winners-log:
