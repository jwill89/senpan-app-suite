name: CI

# Runs the full quality gate on every push and pull request: the Vue/TS
# frontend (lint, type-check, unit tests, production build) and the Go backend
# (build, vet, test). Mirrors the local `npm` and `go` commands so a green CI
# means the same checks a developer runs locally have passed.
on:
  push:
  pull_request:

# Cancel superseded runs on the same ref so pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint · types · tests · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      # Check out WITHOUT the eslint-config PAT and WITHOUT submodules.
      # persist-credentials: false keeps even the default GITHUB_TOKEN out of
      # .git/config, so the untrusted npm lifecycle scripts that `npm ci` runs
      # below can't read a stored credential. The private submodule is fetched
      # separately in the next step with a scoped, non-persisted token.
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # The frontend ESLint config lives in the private @jwill89/eslint-config
      # repo, wired in as the frontend/eslint-config submodule. Fetch it with a
      # PAT that can read that repo (ESLINT_CONFIG_TOKEN secret — ideally a
      # fine-grained, read-only token limited to that repo) — the default
      # GITHUB_TOKEN can't reach a different private repo. The credential is
      # injected via a temporary `insteadOf` rewrite and unset immediately after,
      # so it is never written into .git/config or the submodule config where
      # later `npm ci` lifecycle scripts could read it.
      - name: Fetch ESLint config submodule
        working-directory: ${{ github.workspace }}
        env:
          ESLINT_CONFIG_TOKEN: ${{ secrets.ESLINT_CONFIG_TOKEN }}
        run: |
          if [ -z "$ESLINT_CONFIG_TOKEN" ]; then
            echo "ERROR: ESLINT_CONFIG_TOKEN secret is not set." >&2
            exit 1
          fi
          git config --global url."https://x-access-token:${ESLINT_CONFIG_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
          git config --global --unset url."https://x-access-token:${ESLINT_CONFIG_TOKEN}@github.com/".insteadOf

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # The TS domain types (`src/types/api.generated.ts`) are gitignored and
      # generated from the Go model by tygo, so CI must regenerate them before
      # type-checking / building. Requires the Go toolchain.
      - name: Set up Go (for tygo type generation)
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # FontAwesome Pro packages (@fortawesome + the @awesome.me kit) install from
      # FontAwesome's private registry. The local frontend/.npmrc that points those
      # scopes at it is gitignored (it carries an auth token), so CI must recreate
      # it from the FONTAWESOME_TOKEN repo secret (Settings → Secrets and variables
      # → Actions). Without this, `npm ci` fails with "E401 missing password".
      - name: Configure FontAwesome registry
        env:
          FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
        run: |
          if [ -z "$FONTAWESOME_TOKEN" ]; then
            echo "ERROR: FONTAWESOME_TOKEN secret is not set." >&2
            exit 1
          fi
          {
            echo "@awesome.me:registry=https://npm.fontawesome.com/"
            echo "@fortawesome:registry=https://npm.fontawesome.com/"
            echo "//npm.fontawesome.com/:_authToken=${FONTAWESOME_TOKEN}"
          } > .npmrc

      # --prefer-offline installs from the setup-node npm cache and only hits the
      # network for packages MISSING from it. That stops `npm ci` from revalidating
      # cached packages against their registry every run — notably the Font Awesome
      # Pro kit (@awesome.me/kit-…), whose fetches count against the kit's bandwidth.
      # So FontAwesome is contacted only when package-lock.json actually changes.
      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Generate API types (tygo)
        run: npm run gen:types

      - name: Lint
        run: npm run lint:check

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  backend:
    name: Backend (lint · build · vet · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # golangci-lint aggregates errcheck/govet/staticcheck/unused plus the
      # extras configured in backend/.golangci.yml. Pinned to match the version
      # developers run locally so CI and local results agree.
      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      # Scan the module (and its dependencies) for known Go vulnerabilities that
      # actually reach our code paths. Run latest so newly disclosed advisories
      # are caught without bumping a pin.
      - name: Vulnerability check (govulncheck)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  plugin:
    name: Plugin (build · warnings=errors · format · lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/SenpanCompanion
    env:
      # The FFXIV Dalamud plugin. Dalamud.NET.Sdk normally resolves its reference
      # assemblies from a local XIVLauncher install, which CI doesn't have — so we
      # download the official Dalamud dev distribution and point DALAMUD_HOME at it
      # (the SDK honors that override). Tracking `latest` means an upstream Dalamud
      # API bump can turn this job red, which is the cue to bump DalamudApiLevel.
      # (Compiling this net*-windows project on Linux is enabled by the conditioned
      # EnableWindowsTargeting property in SenpanCompanion.csproj.)
      DALAMUD_HOME: ${{ github.workspace }}/.dalamud
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Fetch Dalamud dev distribution
        run: |
          mkdir -p "$DALAMUD_HOME"
          curl -fsSL https://goatcorp.github.io/dalamud-distrib/latest.zip -o "$RUNNER_TEMP/dalamud.zip"
          unzip -q "$RUNNER_TEMP/dalamud.zip" -d "$DALAMUD_HOME"

      # Promote warnings to errors so the plugin's 0-warning rule is enforced, not
      # merely observed.
      - name: Build (Release · warnings = errors)
        run: dotnet build -c Release -p:TreatWarningsAsErrors=true

      # Whitespace/style gate. Rules are pinned in plugins/SenpanCompanion/.editorconfig.
      - name: Format check
        run: dotnet format --verify-no-changes

      # C# lint gate (the analog to golangci-lint / eslint): the Roslynator CLI, pinned
      # in .config/dotnet-tools.json, fails on any analyzer diagnostic at info or above.
      # The ruleset is curated in plugins/SenpanCompanion/.editorconfig.
      - name: Restore lint tool
        run: dotnet tool restore
      - name: Roslynator analyze
        run: dotnet roslynator analyze SenpanCompanion.csproj --severity-level info

  # On a push to main, AFTER the whole gate passes, tag + release any component
  # whose current version has no release yet. Tags follow <Component>-v<version>
  # (Frontend-v3.5.0, Backend-v3.4.0, Plugin-v2.0.1.0) and each release body is
  # that component's CHANGELOG.md section, so a green version bump auto-publishes
  # a release linked to its notes. Idempotent — versions already released are
  # skipped, so ordinary main pushes are a no-op here.
  release:
    name: Tag + release (main, on version bump)
    needs: [frontend, backend, plugin]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need existing tags to detect what's already released

      - name: Tag + release changed component versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/release.sh
